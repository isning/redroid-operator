name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  # ── test ─────────────────────────────────────────────────────────────────────
  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.24.x", "stable"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Build operator
        run: make build

      - name: Build kubectl-redroid plugin
        run: make build-plugin

      - name: Run tests
        run: make test

  # ── lint ─────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 1.24.x
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10.1
          args: --timeout=5m

  # ── build-plugin ─────────────────────────────────────────────────────────────
  build-plugin:
    name: Build kubectl-redroid
    uses: ./.github/workflows/build-cli.yml
    with:
      artifact-prefix: snapshot-cli

  # ── helm-lint ─────────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 1.24.x
          cache: true

      - name: Generate CRDs and sync into chart
        run: make manifests helm-crds

      - name: Lint Helm chart
        run: make helm-lint

  # ── helm-test ────────────────────────────────────────────────────────────────
  helm-test:
    name: Helm chart unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 1.24.x
          cache: true

      - name: Generate CRDs and sync into chart
        run: make manifests helm-crds

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest

      - name: Run Helm chart unit tests
        run: make helm-test
