name: Release

# Publishes a versioned release when a v* tag is pushed.
# Artifacts:
#   * Container image:  ghcr.io/isning/redroid-operator:<version>  (+ :latest)
#   * Helm chart OCI:   oci://ghcr.io/isning/charts/redroid-operator:<version>
#   * Helm chart tgz:   uploaded to GitHub Release
#   * Helm repo index:  index.yaml on gh-pages branch (tgz URLs → GitHub Release)
#   * crds.yaml:        combined CRD file uploaded to GitHub Release
#   * CLI binaries:     tar.gz / zip per platform, uploaded to GitHub Release
#
# Helm install:
#   helm repo add redroid https://isning.github.io/redroid-operator
#   helm install redroid-operator redroid/redroid-operator
# -- or via OCI --
#   helm install redroid-operator oci://ghcr.io/isning/charts/redroid-operator

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create GitHub Release + push gh-pages branch
  packages: write   # push to GHCR (image + OCI chart)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/isning/redroid-operator
  SIDECAR_IMAGE_NAME: ghcr.io/isning/redroid-operator/kmsg
  CHART_REPO: ghcr.io/isning/charts

jobs:
  # ── container image (parallel per-platform build + manifest merge) ───────────
  image-build:
    name: Build image (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Set platform pair env var
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  image-merge:
    name: Merge and push multi-arch image
    runs-on: ubuntu-latest
    needs: image-build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Create and push manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect manifest
        run: docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  # ── kmsg-tools image (release, parallel per-platform) ───────────────────────
  kmsg-tools-build:
    name: Build kmsg-tools (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Set platform pair env var
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tools image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.TOOLS_IMAGE_NAME }}

      - name: Build and push tools by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: kmsg-tools/
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.TOOLS_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=tools-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=tools-${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/tools-digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/tools-digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: tools-digest-${{ env.PLATFORM_PAIR }}
          path: /tmp/tools-digests/*
          if-no-files-found: error
          retention-days: 1

  kmsg-tools-merge:
    name: Merge and push multi-arch kmsg-tools image
    runs-on: ubuntu-latest
    needs: kmsg-tools-build
    steps:
      - name: Download tools digests
        uses: actions/download-artifact@v8
        with:
          pattern: tools-digest-*
          path: /tmp/tools-digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract tools image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.TOOLS_IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Create and push tools manifest list
        working-directory: /tmp/tools-digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.TOOLS_IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect tools manifest
        run: docker buildx imagetools inspect ${{ env.TOOLS_IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  # ── helm chart ───────────────────────────────────────────────────────────────
  helm-chart:
    name: Package Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Generate CRDs and sync into chart
        run: make manifests helm-crds

      - name: Set chart version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"   # strip leading 'v' for SemVer
          sed -i "s/^version:.*/version: ${VERSION}/" charts/redroid-operator/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/redroid-operator/Chart.yaml

      - name: Package Helm chart
        run: make helm-package

      - name: Combine CRDs into single file for release asset
        run: |
          {
            cat charts/redroid-operator/crds/redroid.isning.moe_redroidinstances.yaml
            echo "---"
            cat charts/redroid-operator/crds/redroid.isning.moe_redroidtasks.yaml
          } > dist/crds.yaml

      - name: Upload chart and CRDs as artifacts
        uses: actions/upload-artifact@v7
        with:
          name: helm-chart
          path: |
            dist/redroid-operator-*.tgz
            dist/crds.yaml
          if-no-files-found: error

  # ── cli binaries ─────────────────────────────────────────────────────────────
  cli:
    name: Build CLI
    uses: ./.github/workflows/build-cli.yml
    with:
      version: ${{ github.ref_name }}
      artifact-prefix: cli

  # ── publish: GitHub Release + OCI chart ──────────────────────────────────────
  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [image-merge, kmsg-tools-merge, helm-chart, cli]
    permissions:
      contents: write
      packages: write
    steps:
      - name: Download CLI artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: cli-*
          path: artifacts/
          merge-multiple: true

      - name: Download Helm chart artifact
        uses: actions/download-artifact@v8
        with:
          name: helm-chart
          path: artifacts/

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Log in to GHCR (Helm OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Push Helm chart to OCI registry
        run: |
          tgz=$(ls artifacts/redroid-operator-*.tgz)
          helm push "${tgz}" oci://${{ env.CHART_REPO }}
          # Alias as 'latest' so consumers can track the current stable release
          VERSION="${GITHUB_REF_NAME#v}"
          crane tag "${{ env.CHART_REPO }}/redroid-operator:${VERSION}" latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/kubectl-redroid-*.tar.gz
            artifacts/kubectl-redroid-*.zip
            artifacts/redroid-operator-*.tgz
            artifacts/crds.yaml
          generate_release_notes: true

  # ── gh-pages (Helm classic repo index) ───────────────────────────────────────
  gh-pages:
    name: Update Helm repo index on gh-pages
    runs-on: ubuntu-latest
    needs: [publish]   # run after GitHub Release is live so tgz URLs are valid
    permissions:
      contents: write
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download chart artifact
        uses: actions/download-artifact@v8
        with:
          name: helm-chart
          path: chart-artifacts/

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Set up gh-pages worktree
        run: |
          git fetch origin gh-pages || true
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            # First-time: create an orphan branch with a minimal README
            git worktree add --detach /tmp/gh-pages HEAD
            cd /tmp/gh-pages
            git checkout --orphan gh-pages
            git reset --hard
            {
              echo "# redroid-operator Helm Repository"
              echo ""
              echo "    helm repo add redroid https://isning.github.io/redroid-operator"
              echo "    helm repo update"
              echo "    helm install redroid-operator redroid/redroid-operator"
              echo ""
              echo "Or via OCI:"
              echo ""
              echo "    helm install redroid-operator oci://ghcr.io/isning/charts/redroid-operator"
            } > README.md
            git add README.md
            git commit -m "chore: initialize Helm chart repository"
          fi

      - name: Generate / merge index.yaml
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          RELEASE_BASE="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          CHART_TGZ="redroid-operator-${VERSION}.tgz"

          mkdir -p /tmp/staging
          cp "chart-artifacts/${CHART_TGZ}" /tmp/staging/

          # Merge with existing index so older releases are preserved
          if [[ -f /tmp/gh-pages/index.yaml ]]; then
            helm repo index /tmp/staging \
              --url "${RELEASE_BASE}" \
              --merge /tmp/gh-pages/index.yaml
          else
            helm repo index /tmp/staging \
              --url "${RELEASE_BASE}"
          fi

          # Only store index.yaml on gh-pages; tgz is served from GitHub Releases
          cp /tmp/staging/index.yaml /tmp/gh-pages/

      - name: Commit and push
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd /tmp/gh-pages
          git add index.yaml
          git diff --staged --quiet && exit 0
          git commit -m "chore: release redroid-operator ${VERSION}"
          git push origin HEAD:gh-pages
