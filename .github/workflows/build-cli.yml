name: Build CLI (reusable)

# Reusable workflow — builds kubectl-redroid for all platforms.
# Called by ci.yml (snapshot version) and release.yml (release version).

on:
  workflow_call:
    inputs:
      version:
        description: "Version string injected via ldflags (leading 'v' stripped automatically). Defaults to 0.0.0-<short-sha> when empty."
        required: false
        type: string
        default: ""
      artifact-prefix:
        description: "Prefix for uploaded artifact names, e.g. 'cli' or 'snapshot-cli'."
        required: false
        type: string
        default: cli

jobs:
  build:
    name: ${{ inputs.artifact-prefix }} (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: "0"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Build and package kubectl-redroid
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"   # strip leading 'v' if present
          [[ -z "$VERSION" ]] && VERSION="0.0.0-${GITHUB_SHA::7}"
          mkdir -p dist
          if [[ "$GOOS" == "windows" ]]; then
            go build -mod=vendor \
              -ldflags "-s -w -X github.com/isning/redroid-operator/cmd/kubectl-redroid/cmd.Version=${VERSION}" \
              -o dist/kubectl-redroid.exe \
              ./cmd/kubectl-redroid/
            zip -j "dist/kubectl-redroid-${VERSION}-${GOOS}-${GOARCH}.zip" dist/kubectl-redroid.exe
            rm dist/kubectl-redroid.exe
          else
            go build -mod=vendor \
              -ldflags "-s -w -X github.com/isning/redroid-operator/cmd/kubectl-redroid/cmd.Version=${VERSION}" \
              -o dist/kubectl-redroid \
              ./cmd/kubectl-redroid/
            tar -czf "dist/kubectl-redroid-${VERSION}-${GOOS}-${GOARCH}.tar.gz" \
              -C dist kubectl-redroid
            rm dist/kubectl-redroid
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-prefix }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/kubectl-redroid-*.tar.gz
            dist/kubectl-redroid-*.zip
          if-no-files-found: error
          retention-days: 7
