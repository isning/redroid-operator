# Default values for redroid-operator.

# -- Number of controller-manager replicas.
replicaCount: 1

image:
  # -- Image repository.
  repository: ghcr.io/isning/redroid-operator
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Image tag. Defaults to the chart appVersion.
  tag: ""

# -- Image pull secrets (list of {name: ...}).
imagePullSecrets: []

# -- Override the deployed resource names.
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Whether to create the ServiceAccount.
  create: true
  # -- Extra annotations to add to the ServiceAccount.
  annotations: {}
  # -- Override service account name (defaults to chart fullname).
  name: ""

# -- Extra annotations added to the controller-manager Pod.
podAnnotations: {}

# -- SecurityContext for the controller-manager Pod.
podSecurityContext:
  runAsNonRoot: true

# -- SecurityContext for the manager container.
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop: [ALL]

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# -- Node selector for the controller-manager Pod.
nodeSelector: {}

# -- Tolerations for the controller-manager Pod.
tolerations: []

# -- Affinity for the controller-manager Pod.
affinity: {}

# -- Extra environment variables to set in the manager container.
extraEnv: []

# -- Enable leader election (recommended when replicaCount > 1).
leaderElection: true

# -- Metrics port exposed by the manager.
metricsPort: 8080

# -- Health probe port exposed by the manager.
healthzPort: 8081

# -- RBAC: create ClusterRole/Role and their bindings for the operator.
rbac:
  create: true

# -- Namespaced-mode configuration.
# When enabled is false (default) the operator runs cluster-wide:
#   a ClusterRole + ClusterRoleBinding are created.
# When enabled is true the operator watches only the listed namespaces:
#   a Role + RoleBinding are created per namespace instead.
watchNamespaces:
  enabled: false
  namespaces: []

# -- Whether to install CRDs as part of this chart.
# Set to false if you manage CRDs separately.
installCRDs: true
