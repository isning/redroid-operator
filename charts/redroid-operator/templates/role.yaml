{{- $namespaces := .Values.watchNamespaces.namespaces -}}
{{- if and .Values.rbac.create .Values.watchNamespaces.enabled -}}
{{- /* One Role per watched namespace */ -}}
{{- range $namespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "redroid-operator.fullname" $ }}-manager
  namespace: {{ . }}
  labels:
    {{- include "redroid-operator.labels" $ | nindent 4 }}
rules:
  # RedroidInstance CRD
  - apiGroups: [redroid.isning.moe]
    resources: [redroidinstances]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [redroid.isning.moe]
    resources: [redroidinstances/status, redroidinstances/finalizers]
    verbs: [get, update, patch]
  # RedroidTask CRD
  - apiGroups: [redroid.isning.moe]
    resources: [redroidtasks]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [redroid.isning.moe]
    resources: [redroidtasks/status, redroidtasks/finalizers]
    verbs: [get, update, patch]
  # Core: Pods, Services and ConfigMaps
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [""]
    resources: [services/portforward]
    verbs: [create, get]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  # Batch: Jobs and CronJobs
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch, create, update, patch, delete]
{{- end }}
{{- end }}
{{- if .Values.rbac.create }}
---
{{- /* Leader-election Role — always in the operator's own namespace */}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "redroid-operator.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redroid-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, create, update]
{{- end }}
